<h2>Welcome Image</h2>
@if (latestImageUrl) {
  <div class="latest-image">
    <p>I connected a little screen to the raspberry pi that this website is running on. Currently on display:</p>
    <img [src]="latestImageUrl" alt="Latest welcome image" />
  </div>
}
<div class="upload-form">
  <label class="file-select-btn">
    Choose file
    <input type="file" accept="image/*" (change)="onFileSelected($event)" />
  </label>
  <span class="file-name">{{ selectedFile ? selectedFile.name : 'No file chosen' }}</span>
  <button class="upload-btn" (click)="onUpload()" [disabled]="isUploading">
    {{ isUploading ? 'Uploading...' : 'Upload' }}
  </button>
</div>
@if (uploadSuccess) {
  <p class="success">Image uploaded successfully!</p>
}
@if (uploadError) {
  <p class="error">{{ uploadError }}</p>
}
